name: CI
# ▲ The loop gates on a workflow whose `name:` matches CI_WORKFLOW (scripts/harness.env, default "CI").

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Definition of Done
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (root)
        run: npm ci

      - name: Install (dashboard)
        run: npm --prefix dashboard ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build dashboard
        run: npm --prefix dashboard run build

      - name: Test dashboard
        run: npm --prefix dashboard test
